<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H__HBot Armory — CS2 Case Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#101318; --panel:#191e26; --panel2:#1f2530; --line:#2b3340;
  --text:#e8ecf2; --dim:#8b95a5;
  --milspec:#4b69ff; --restricted:#8847ff; --classified:#d32ce6;
  --covert:#eb4b4b; --gold:#e4ae39; --st:#cf6a32;
  --up:#6fd66f; --down:#eb4b4b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;font-size:15px;line-height:1.45;min-height:100vh}
.wrap{max-width:1060px;margin:0 auto;padding:24px 16px 80px}
a{color:inherit}
.display{font-family:'Chakra Petch',sans-serif;text-transform:uppercase;letter-spacing:.06em}
.num{font-variant-numeric:tabular-nums}

/* header */
header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}
h1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:26px;letter-spacing:.08em;text-transform:uppercase}
h1 span{color:var(--gold)}
#updated{color:var(--dim);font-size:13px}

/* biggest pull showcase */
#showcase{position:relative;overflow:hidden;display:flex;align-items:center;gap:20px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px 24px;margin-bottom:14px}
#showcase .glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(60% 120% at 82% 50%, var(--rar, var(--milspec)) 0%, transparent 60%);opacity:.16}
#showcase img{width:190px;max-width:38vw;flex-shrink:0;order:2;filter:drop-shadow(0 6px 18px rgba(0,0,0,.55))}
#showcase .info{flex:1;order:1;min-width:0}
.eyebrow{font-family:'Chakra Petch',sans-serif;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
#sc-name{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:22px;line-height:1.2;margin-bottom:4px}
#sc-sub{color:var(--dim);font-size:13px;margin-bottom:12px}
#sc-sub b{color:var(--text);font-weight:600}
#sc-price{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:30px;color:var(--gold)}
#showcase.gold::after{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 40%,rgba(255,225,140,.14) 50%,transparent 60%);background-size:250% 100%;animation:sheen 4.5s linear infinite;pointer-events:none}
@keyframes sheen{from{background-position:200% 0}to{background-position:-50% 0}}
@media(prefers-reduced-motion:reduce){#showcase.gold::after{animation:none}}

/* stat chips */
#chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--dim)}
.chip b{display:block;color:var(--text);font-family:'Chakra Petch',sans-serif;font-size:17px;font-weight:600}

/* controls */
#controls{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
h2{font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
#search{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:8px 12px;font:inherit;font-size:14px;width:210px;max-width:45vw}
#search:focus{outline:2px solid var(--milspec);outline-offset:1px}

/* leaderboard */
.row{display:grid;grid-template-columns:44px minmax(0,1fr) 86px 100px 130px;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:6px;cursor:pointer;text-align:left;width:100%;color:inherit;font:inherit}
.row:hover,.row:focus-visible{background:var(--panel2);border-color:#3a4556;outline:none}
.row .rank{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px;color:var(--dim)}
.row .rank.m1{color:var(--gold)}.row .rank.m2{color:#c8d2e0}.row .rank.m3{color:#c0763c}
.row .who{min-width:0}
.row .who .n{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .who .b{color:var(--dim);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .cell{font-size:13px;color:var(--dim);text-align:right}
.row .cell b{display:block;color:var(--text);font-weight:600;font-size:14px}
.row .worth{text-align:right;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:18px}
.pl-up{color:var(--up)}.pl-down{color:var(--down)}
.colhead{display:grid;grid-template-columns:44px minmax(0,1fr) 86px 100px 130px;gap:10px;padding:0 14px 6px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.colhead span:nth-child(n+3){text-align:right}
@media(max-width:640px){
  .row,.colhead{grid-template-columns:34px minmax(0,1fr) 110px}
  .row .cell.hide-m,.colhead .hide-m{display:none}
  #showcase img{width:140px}
}

/* inventory view */
#back{background:none;border:1px solid var(--line);border-radius:8px;color:var(--dim);padding:7px 14px;font:inherit;font-size:13px;cursor:pointer;margin-bottom:16px}
#back:hover{color:var(--text);border-color:#3a4556}
#pheader{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:4px}
#pname{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:24px}
#pstats{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 20px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:10px}
.card{background:var(--panel);border:1px solid var(--line);border-bottom:3px solid var(--rar,var(--milspec));border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:6px}
.card .imgbox{background:radial-gradient(70% 70% at 50% 45%,color-mix(in srgb,var(--rar) 22%,transparent),transparent 75%);border-radius:6px;display:flex;justify-content:center;padding:6px 4px}
.card img{width:100%;max-width:150px;aspect-ratio:4/3;object-fit:contain}
.card .wn{color:var(--dim);font-size:11.5px;line-height:1.2}
.card .sn{font-weight:600;font-size:13.5px;line-height:1.25}
.st{display:inline-block;color:var(--st);font-size:10.5px;font-weight:700;letter-spacing:.04em;border:1px solid var(--st);border-radius:4px;padding:0 5px;margin-right:5px;vertical-align:1px}
.wear{color:var(--dim);font-size:11.5px}
.floatbar{position:relative;height:4px;border-radius:2px;background:linear-gradient(90deg,#3fbf5a 0 7%,#87c33f 0 15%,#d3c53a 0 38%,#d3873a 0 45%,#c9453b 0 100%);margin:2px 0}
.floatbar i{position:absolute;top:-3px;width:2px;height:10px;background:#fff;border-radius:1px}
.card .pr{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:15px;margin-top:auto}
.gold-t{color:var(--gold)}

/* states */
#msg{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:36px 20px;text-align:center;color:var(--dim)}
#msg b{display:block;color:var(--text);font-family:'Chakra Petch',sans-serif;font-size:17px;margin-bottom:6px}
.hidden{display:none!important}
footer{margin-top:40px;color:var(--dim);font-size:12px;text-align:center}
footer a{color:var(--dim)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>H__HBot <span>Armory</span></h1>
    <div id="updated" class="num"></div>
  </header>

  <div id="msg"><b>Loading&hellip;</b>fetching the latest data</div>

  <section id="board" class="hidden">
    <div id="showcase" class="hidden">
      <div class="glow"></div>
      <img id="sc-img" alt="">
      <div class="info">
        <div class="eyebrow">Biggest pull</div>
        <div id="sc-name"></div>
        <div id="sc-sub"></div>
        <div id="sc-price" class="num"></div>
      </div>
    </div>

    <div id="chips"></div>

    <div id="controls">
      <h2>Leaderboard &middot; net worth</h2>
      <input id="search" type="search" placeholder="Find a player" aria-label="Find a player">
    </div>
    <div class="colhead"><span>#</span><span>Player</span><span class="hide-m">Opened</span><span class="hide-m">P / L</span><span>Net worth</span></div>
    <div id="rows"></div>
  </section>

  <section id="player" class="hidden">
    <button id="back">&larr; Leaderboard</button>
    <div id="pheader"><div id="pname"></div></div>
    <div id="pstats"></div>
    <div id="grid"></div>
  </section>

  <footer>Play in chat: ~cs wage &middot; ~cs open &lt;case&gt; &middot; ~cs inv &middot; ~cs sell &middot; Prices from Skinport &middot; Not affiliated with Valve</footer>
</div>

<script>
const RARITY = {
  'Mil-Spec':'var(--milspec)', 'Restricted':'var(--restricted)',
  'Classified':'var(--classified)', 'Covert':'var(--covert)', 'Rare Special':'var(--gold)'
};
const $ = id => document.getElementById(id);
const money = n => '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let DATA = null;

function ago(ts){
  const m = Math.max(0, Math.round((Date.now()-ts)/60000));
  if(m < 1) return 'updated just now';
  if(m < 60) return 'updated ' + m + 'm ago';
  return 'updated ' + Math.round(m/60) + 'h ago';
}

// Split "StatTrak™ AK-47 | Redline (Field-Tested)" into weapon / skin parts
function splitName(full){
  let s = String(full);
  const st = s.includes('StatTrak™');
  s = s.replace('StatTrak™ ','');
  const parts = s.split(' | ');
  const weapon = parts[0];
  const skin = (parts[1]||'').replace(/\s*\((Factory New|Minimal Wear|Field-Tested|Well-Worn|Battle-Scarred)\)\s*$/,'') || '(Vanilla)';
  return { weapon, skin, st };
}

function showcase(bp){
  if(!bp){ $('showcase').classList.add('hidden'); return; }
  const sc = $('showcase');
  sc.classList.remove('hidden');
  sc.classList.toggle('gold', !!bp.gold);
  sc.style.setProperty('--rar', RARITY[bp.rarity] || 'var(--milspec)');
  $('sc-img').src = bp.image || '';
  $('sc-img').alt = bp.name;
  $('sc-name').textContent = bp.name;
  $('sc-name').className = bp.gold ? 'gold-t' : '';
  $('sc-sub').innerHTML = 'unboxed by <b>' + esc(bp.owner) + '</b> from ' + esc(bp.case) +
    (bp.float != null ? ' · float ' + bp.float : '');
  $('sc-price').textContent = money(bp.price);
}

function chips(st){
  $('chips').innerHTML = [
    ['Players', st.players],
    ['Cases opened', st.totalOpened.toLocaleString()],
    ['Total spent', money(st.totalSpent)],
    ['Total unboxed', money(st.totalUnboxed)]
  ].map(([l,v]) => '<div class="chip">'+l+'<b class="num">'+v+'</b></div>').join('');
}

function board(filter){
  const q = (filter||'').toLowerCase();
  const rows = DATA.players
    .map((p,i)=>({p,i}))
    .filter(({p}) => !q || p.name.includes(q));

  $('rows').innerHTML = rows.length ? rows.map(({p,i}) => {
    const up = p.profit >= 0;
    const medal = i<3 ? ' m'+(i+1) : '';
    const best = p.bestItem ? esc(p.bestItem.name)+' · '+money(p.bestItem.price) : 'no items';
    return '<button class="row" data-p="'+esc(p.name)+'">'+
      '<span class="rank display'+medal+'">'+(i+1)+'</span>'+
      '<span class="who"><span class="n">'+esc(p.name)+'</span><span class="b">'+best+'</span></span>'+
      '<span class="cell hide-m num"><b>'+p.casesOpened+'</b></span>'+
      '<span class="cell hide-m num '+(up?'pl-up':'pl-down')+'"><b class="'+(up?'pl-up':'pl-down')+'">'+(up?'+':'−')+money(Math.abs(p.profit)).slice(1)+'</b></span>'+
      '<span class="worth num">'+money(p.netWorth)+'</span>'+
    '</button>';
  }).join('') : '<div id="msg"><b>No players found</b>try another name</div>';

  document.querySelectorAll('.row').forEach(el =>
    el.addEventListener('click', () => { location.hash = '#/p/' + encodeURIComponent(el.dataset.p); }));
}

function card(it){
  const {weapon, skin, st} = splitName(it.name);
  const rar = RARITY[it.rarity] || 'var(--milspec)';
  const floatBar = it.float != null && it.wear
    ? '<div class="wear">'+esc(it.wear)+' · '+it.float+'</div><div class="floatbar"><i style="left:'+(Math.min(1,Math.max(0,it.float))*100)+'%"></i></div>'
    : '<div class="wear">Vanilla</div>';
  return '<div class="card" style="--rar:'+rar+'">'+
    '<div class="imgbox"><img loading="lazy" src="'+esc(it.image||'')+'" alt=""></div>'+
    '<div><div class="wn">'+(st?'<span class="st">ST™</span>':'')+esc(weapon)+'</div>'+
    '<div class="sn'+(it.gold?' gold-t':'')+'">'+esc(skin)+'</div></div>'+
    floatBar+
    '<div class="pr num">'+money(it.price)+'</div>'+
  '</div>';
}

function player(name){
  const p = DATA.players.find(x => x.name === name);
  const inv = (DATA.inventories||{})[name] || [];
  if(!p){ location.hash=''; return; }
  $('pname').textContent = p.name;
  $('pstats').innerHTML = [
    ['Net worth', money(p.netWorth)],
    ['Cash', money(p.balance)],
    ['Inventory ('+inv.length+')', money(p.invValue)],
    ['Cases opened', p.casesOpened],
    ['Profit / loss', (p.profit>=0?'+':'−') + money(Math.abs(p.profit)).slice(1)]
  ].map(([l,v]) => '<div class="chip">'+l+'<b class="num">'+v+'</b></div>').join('');
  $('grid').innerHTML = inv.length
    ? inv.map(card).join('')
    : '<div id="msg" style="grid-column:1/-1"><b>Empty inventory</b>everything was sold — or nothing unboxed yet</div>';
}

function route(){
  const m = location.hash.match(/^#\/p\/(.+)$/);
  const onPlayer = !!(m && DATA);
  $('board').classList.toggle('hidden', onPlayer);
  $('player').classList.toggle('hidden', !onPlayer);
  if(onPlayer) player(decodeURIComponent(m[1]));
  window.scrollTo(0,0);
}

$('back').addEventListener('click', () => { location.hash=''; });
$('search').addEventListener('input', e => board(e.target.value));
window.addEventListener('hashchange', route);

fetch('data.json', {cache:'no-store'})
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(d => {
    DATA = d;
    $('msg').classList.add('hidden');
    $('updated').textContent = d.updated ? ago(d.updated) : '';
    showcase(d.bestPull);
    chips(d.stats);
    board('');
    route();
    if(!d.players.length){
      $('rows').innerHTML = '<div id="msg"><b>No unboxes yet</b>type ~cs wage in chat to start playing</div>';
    }
  })
  .catch(err => {
    $('msg').innerHTML = '<b>No data yet</b>the bot hasn\'t published data.json — check the bot console';
    console.error(err);
  });
</script>
</body>
</html>
